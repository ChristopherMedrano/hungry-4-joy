services:
  - type: web
    name: hungry-4-joy-wordpress
    runtime: docker
    plan: free
    rootDir: wordpress
    healthCheckPath: /
    envVars:
      - key: WP_SITE_URL
        value: https://hungry-4-joy-wordpress.onrender.com
      - key: WP_SITE_TITLE
        value: Hungry 4 Joy
      - key: WP_ADMIN_USER
        value: h4j_demo_admin
      - key: WP_ADMIN_PASSWORD
        sync: false
      - key: WP_ADMIN_EMAIL
        sync: false
      - key: WP_SQLITE_DIR
        value: /tmp/hungry-4-joy-wordpress
      - key: WP_SQLITE_FILE
        value: demo.sqlite
      - key: WP_DEBUG
        value: "false"
      - key: PORT
        value: "80"

  - type: web
    name: hungry-4-joy-middleware
    runtime: docker
    plan: free
    rootDir: middleware-api
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: Hungry 4 Joy Middleware API
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: FOXY_WEBHOOK_ENCRYPTION_KEY
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: hungry-4-joy-middleware-db
          property: connectionString
      - key: LOG_CHANNEL
        value: stderr
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: SESSION_DRIVER
        value: file
      - key: MAIL_MAILER
        value: log
      - key: CORS_ALLOWED_ORIGINS
        value: https://hungry-4-joy-dashboard.onrender.com,http://127.0.0.1:5173,http://127.0.0.1:5174,http://localhost:5173,http://localhost:5174

  - type: web
    name: hungry-4-joy-dashboard
    runtime: docker
    plan: free
    rootDir: dashboard
    healthCheckPath: /
    envVars:
      - key: MIDDLEWARE_API_TARGET
        fromService:
          name: hungry-4-joy-middleware
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: PORT
        value: "8080"

databases:
  - name: hungry-4-joy-middleware-db
    plan: free
    databaseName: hungry_4_joy_middleware
    user: hungry_4_joy
    ipAllowList: []
