<script>
(function () {
  function showCopied(el) {
    var label = el.querySelector('.h4j-copy__label');

    if (!label) {
      return;
    }

    var original = label.textContent;
    label.textContent = 'Copied!';
    window.setTimeout(function () {
      label.textContent = original;
    }, 1200);
  }

  function fallbackCopy(value, el) {
    var textarea = document.createElement('textarea');
    textarea.value = value;
    textarea.setAttribute('readonly', '');
    textarea.style.position = 'fixed';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();

    try {
      if (document.execCommand('copy')) {
        showCopied(el);
      }
    } catch (error) {}

    document.body.removeChild(textarea);
  }

  function copyValue(value, el) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(value).then(function () {
        showCopied(el);
      }).catch(function () {
        fallbackCopy(value, el);
      });
      return;
    }

    fallbackCopy(value, el);
  }

  document.addEventListener('click', function (event) {
    var target = event.target;

    if (!target || typeof target.closest !== 'function') {
      return;
    }

    var copyButton = target.closest('[data-copy]');

    if (!copyButton) {
      return;
    }

    event.preventDefault();
    copyValue(copyButton.getAttribute('data-copy') || '', copyButton);
  });
})();
</script>
